#textdomain wesnoth-knights_of_the_silver_spire

# This code is based on "Mounted_General.cfg" which is licensed under the GPL version 2 or later and comes from Battle for Wesnoth version 1.16's campaign "The South Guard"

[unit_type]
    id=Grandmaster
    name= _ "Grand Master"
    race=human
    image=units/deoran/grandmaster.png
    hitpoints=85
    alignment=lawful
    cost=95
    movement_type=mounted
    movement=7
    level=4
    advances_to=null
    {AMLA_DEFAULT}
    experience=200
    usage=fighter
    [abilities]
        {ABILITY_LEADERSHIP}
    [/abilities]
    description= _ "Grandmasters are the heads of knightly orders, having shown strength of arms upon the battlefield felling countless threats and a strong will directing their fellow knights. These renowned commanders stand at the front of a righteous charge, inspiring their men to launch another assault when others would have broken already, for the glory of their cause and the hope of a better future."
    die_sound=horse-die.ogg
    [attack]
        name=lance
        #textdomain wesnoth-units
        description= _"lance"
        type=pierce
        [specials]
            {WEAPON_SPECIAL_CHARGE}
        [/specials]
        range=melee
        damage=13
        number=3
    [/attack]
    [attack]
        name=mace
        description= _"mace"
        #textdomain wesnoth-knights_of_the_silver_spire
        type=impact
        range=melee
        damage=22
        number=2
    [/attack]
    [attack]
        name=sword
        #textdomain wesnoth-units
        description=_"longsword"
        icon=attacks/sword-holy.png
        type=arcane
        range=melee
        damage=12
        number=4
    [/attack]
    {DEFENSE_ANIM "units/deoran/grandmaster.png" "units/deoran/grandmaster.png" {SOUND_LIST:HORSE_HIT} }
[/unit_type]
